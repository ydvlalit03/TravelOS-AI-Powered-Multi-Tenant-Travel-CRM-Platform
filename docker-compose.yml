services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-travelos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travelos}
      POSTGRES_DB: ${POSTGRES_DB:-travelos}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travelos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Not published to the host — services reach it over the compose network.
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      # App connects as the non-superuser role so RLS is enforced (see infra/db/init.sql).
      DATABASE_URL: postgresql+asyncpg://travelos_app:travelos_app@db:5432/${POSTGRES_DB:-travelos}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend-storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    environment:
      # Browser reaches the backend via its published host port.
      VITE_API_BASE_URL: http://localhost:${BACKEND_HOST_PORT:-8000}
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  backend-storage:
