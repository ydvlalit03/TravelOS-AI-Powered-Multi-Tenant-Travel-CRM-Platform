# Single-origin nginx for the one-box demo: serves the SPA and reverse-proxies
# the API/assets to the backend, so there are no CORS issues and only port 80
# is exposed.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API (incl. Server-Sent Events — buffering off so streams flush live).
    location /api/ {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location /storage/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
    }

    location = /health {
        proxy_pass http://web:8000;
    }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
